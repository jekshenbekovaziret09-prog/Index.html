<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL://JEKSHENBEKOV.AZIRET.6A</title>
    <style>
        body {
            background-color: #000;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        #matrix {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        header, section {
            background: rgba(0, 10, 0, 0.9);
            border: 2px solid #00ff00;
            padding: 20px;
            margin: 0 auto 20px auto;
            max-width: 900px; /* Чтобы на компьютере не было слишком широко */
            border-radius: 5px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
        }

        h1, h2 {
            color: #33ff33;
            text-transform: uppercase;
            border-bottom: 1px solid #00ff00;
            padding-bottom: 10px;
            letter-spacing: 2px;
        }

        /* Список предметов */
        ul {
            list-style: none;
            padding-left: 0;
        }

        ul li::before {
            content: "> ";
            color: #00ff00;
        }

        button {
            background: #000;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 10px 25px;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        button:hover {
            background: #00ff00;
            color: #000;
            box-shadow: 0 0 15px #00ff00;
        }

        .video-container {
            border: 1px solid #00ff00;
            margin-top: 15px;
            background: #000;
        }

        /* Мигающий курсор */
        .blink {
            animation: blinker 1s linear infinite;
        }

        @keyframes blinker {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <header>
        <h1>SYSTEM OVERRIDE: INFORMATION<span class="blink">_</span></h1>
        <p>USER_ID: Жекшенбеков Азирет</p>
        <p>SECTOR: 6 «А» класс</p>
        <p>LOCAL_TIME: <span id="clock">00:00:00</span></p>
    </header>

    <section>
        <h2>> STATUS LOG</h2>
        <p id="typing" style="height: 20px; font-weight: bold;"></p>
        <button onclick="runCommand()">EXECUTE COMMAND</button>
        <p id="commandResult" style="margin-top: 15px; color: #33ff33;"></p>
    </section>

    <section>
        <h2>> PRIORITY SUBJECTS LIST</h2>
        <ul>
            <li>Информатика (Core)</li>
            <li>Математика (Logic)</li>
            <li>Физкультура (Physical)</li>
        </ul>
    </section>

    <section>
        <h2>> EXTERNAL DATA SOURCE</h2>
        <div class="video-container">
            <iframe 
                width="100%" 
                height="450" 
                src="https://www.youtube.com/embed/Ke-O69bwqY8" 
                frameborder="0" 
                allowfullscreen>
            </iframe>
        </div>
    </section>

    <script>
        // --- MATRIX BACKGROUND ---
        const canvas = document.getElementById("matrix");
        const ctx = canvas.getContext("2d");
        canvas.height = window.innerHeight;
        canvas.width = window.innerWidth;
        const letters = "01".split("");
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];
        for (let x = 0; x < columns; x++) drops[x] = 1;

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00ff00";
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 35);

        // --- TYPING EFFECT ---
        const msg = "CONNECTING TO SERVER... ACCESS GRANTED. WELCOME, OPERATOR AZIRET.";
        let index = 0;
        function type() {
            if (index < msg.length) {
                document.getElementById("typing").innerHTML += msg.charAt(index);
                index++;
                setTimeout(type, 50);
            }
        }
        window.onload = type;

        // --- CLOCK ---
        function updateClock() {
            document.getElementById("clock").textContent = new Date().toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- COMMAND ---
        function runCommand() {
            document.getElementById("commandResult").innerHTML = ">>> [SYSTEM]: ALL SYSTEMS NOMINAL. GRADE A+ SECURED.";
        }

        window.onresize = () => {
            canvas.height = window.innerHeight;
            canvas.width = window.innerWidth;
        };
    </script>

</body>
</html>
