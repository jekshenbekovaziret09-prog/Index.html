<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL://Жекшенбеков.Азирет.6А</title>
    <style>
        body {
            background-color: #000;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        #matrix {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        header, section {
            background: rgba(0, 15, 0, 0.85);
            border: 1px solid #00ff00;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
        }

        h1, h2 {
            color: #33ff33;
            text-transform: uppercase;
            border-bottom: 1px solid #00ff00;
            padding-bottom: 10px;
        }

        button {
            background: #000;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 10px 20px;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            text-transform: uppercase;
        }

        button:hover {
            background: #00ff00;
            color: #000;
        }

        .video-container {
            border: 2px solid #00ff00;
            margin-top: 15px;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            background-color: #00ff00;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <header>
        <h1>SYSTEM_OVERRIDE://INFO<span class="cursor">&nbsp;</span></h1>
        <p>USER: Жекшенбеков Азирет</p>
        <p>CLASS: 6 «А»</p>
        <p>TIME: <span id="clock">00:00:00</span></p>
    </header>

    <section>
        <h2>> STATUS_LOG</h2>
        <p id="typing" style="height: 20px; font-weight: bold;"></p>
        <button onclick="runCommand()">RUN COMMAND</button>
        <p id="commandResult" style="margin-top: 15px;"></p>
    </section>

    <section>
        <h2>> PRIORITY_SUBJECTS</h2>
        <ul>
            <li>Информатика</li>
            <li>Математика</li>
            <li>Физкультура</li>
        </ul>
    </section>

    <section>
        <h2>> EXTERNAL_SOURCE</h2>
        <div class="video-container">
            <iframe 
                width="100%" 
                height="315" 
                src="https://www.youtube.com/embed/Ke-O69bwqY8" 
                frameborder="0" 
                allowfullscreen>
            </iframe>
        </div>
    </section>

    <script>
        // МАТРИЦА
        const canvas = document.getElementById("matrix");
        const ctx = canvas.getContext("2d");
        canvas.height = window.innerHeight;
        canvas.width = window.innerWidth;
        const letters = "101010110101".split("");
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];
        for (let x = 0; x < columns; x++) drops[x] = 1;

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00ff00";
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 33);

        // ПЕЧАТЬ
        const message = "INITIALIZING... ACCESS GRANTED. WELCOME, AZIRET.";
        let charIndex = 0;
        function type() {
            if (charIndex < message.length) {
                document.getElementById("typing").innerHTML += message.charAt(charIndex);
                charIndex++;
                setTimeout(type, 60);
            }
        }
        window.onload = type;

        // ЧАСЫ
        function updateClock() {
            document.getElementById("clock").textContent = new Date().toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();

        // КОМАНДА
        function runCommand() {
            const res = document.getElementById("commandResult");
            res.innerHTML = ">>> [SYSTEM]: ВСЕ ЗАДАНИЯ ВЫПОЛНЕНЫ НА 5+";
            res.style.color = "#33ff33";
        }

        window.onresize = () => {
            canvas.height = window.innerHeight;
            canvas.width = window.innerWidth;
        };
    </script>

</body>
        </html>
