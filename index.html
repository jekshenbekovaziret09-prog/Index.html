<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL://JEKSHENBEKOV.AZIRET.6A</title>
    <style>
        /* Базовые настройки стиля Терминала */
        body {
            background-color: #000;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Эффект старого CRT монитора (полоски) */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 10;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        /* Фон Матрица */
        #matrix {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            opacity: 0.3;
        }

        header, section {
            background: rgba(0, 15, 0, 0.85);
            border: 2px solid #00ff00;
            padding: 20px;
            margin: 0 auto 20px auto;
            max-width: 800px;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
            position: relative;
            z-index: 2;
        }

        /* Эффект печатной машинки для заголовка */
        .typing-title {
            display: inline-block;
            overflow: hidden;
            border-right: .15em solid #00ff00;
            white-space: nowrap;
            margin: 0 auto;
            letter-spacing: .15em;
            animation: typing 3.5s steps(30, end), blink-caret .75s step-end infinite;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: #00ff00; }
        }

        h1, h2 {
            color: #33ff33;
            text-transform: uppercase;
            border-bottom: 1px solid #00ff00;
            padding-bottom: 10px;
        }

        /* Кастомный список с мигающим курсором */
        ul {
            list-style: none;
            padding-left: 0;
        }

        li {
            margin-bottom: 10px;
            padding-left: 25px;
            position: relative;
        }

        li::before {
            content: ">";
            position: absolute;
            left: 0;
            color: #00ff00;
            font-weight: bold;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        /* Интерактивная строка ввода (имитация) */
        .console-input {
            display: flex;
            align-items: center;
            margin-top: 20px;
        }

        .console-input span {
            margin-right: 10px;
        }

        input {
            background: transparent;
            border: none;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            outline: none;
            width: 100%;
        }

        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 0.9em;
            color: #008800;
        }

    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <header>
        <h1 class="typing-title">TERMINAL://JEKSHENBEKOV.AZIRET</h1>
        <div class="status-grid">
            <div>STATUS: ONLINE</div>
            <div>LOCATION: KYRGYZSTAN</div>
            <div>SECURITY: HIGH</div>
            <div>ACCESS: ROOT</div>
        </div>
    </header>

    <section>
        <h2>PROJECTS_AND_SKILLS</h2>
        <ul>
            <li>HTML5 / CSS3 / JAVASCRIPT</li>
            <li>WEB_DEVELOPMENT_CORE</li>
            <li>INTERFACE_DESIGN</li>
            <li>DATABASE_MANAGEMENT</li>
        </ul>
    </section>

    <section>
        <h2>SYSTEM_CONSOLE</h2>
        <div class="console-input">
            <span>root@aziret:~$</span>
            <input type="text" placeholder="type command..." autofocus>
        </div>
    </section>

    <script>
        // Скрипт для анимации Матрицы
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()*&^%";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];

        for (let i = 0; i < columns; i++) {
            drops[i] = 1;
        }

        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#0F0";
            ctx.font = fontSize + "px arial";

            for (let i = 0; i < drops.length; i++) {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(draw, 33);

        // Обработка ввода в консоль (просто для фана)
        const input = document.querySelector('input');
        input.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                alert('Access Denied: Command "' + this.value + '" not found.');
                this.value = '';
            }
        });
    </script>
</body>
</html>
